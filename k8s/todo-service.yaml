apiVersion: v1
kind: Service
# Service — постоянная точка доступа к подам с Flask-приложением.

metadata:
  name: todo
  # Имя сервиса. Внутри кластера доступен как "todo". Используется в Ingress.
  labels:
    app: todo
  # Метка для идентификации сервиса.

spec:
  selector:
    app: todo
  # Сервис направляет трафик на поды с меткой app: todo.

  ports:
  - port: 5000
    # Порт, на котором сервис доступен внутри кластера.
    targetPort: 5000
    # Порт на поде (совпадает с containerPort в deployment.yaml).
    name: http
    # Имя порта.

  type: NodePort
  # Тип NodePort открывает доступ снаружи кластера через порт в диапазоне 30000-32767.
  
# КАК ЭТО РАБОТАЕТ:
# -----------------
# 1. Запрос приходит в сервис по имени "todo" на порт 5000 (от Ingress или другого сервиса).
# 2. Сервис по селектору app: todo находит поды с приложением.
# 3. Запрос перенаправляется на один из подов (балансировка нагрузки).
# 4. Flask обрабатывает запрос, ответ возвращается через сервис.
# 5. Благодаря NodePort можно использовать minikube service todo для доступа из браузера.