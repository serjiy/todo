apiVersion: v1
kind: Service

metadata:
  name: loki
  # Имя сервиса. Promtail и Grafana обращаются к Loki по этому имени.
  namespace: default

spec:
  selector:
    app: loki
  # Сервис находит поды с меткой app: loki и направляет трафик на них.

  ports:
    - port: 3100
      # Порт, на котором сервис доступен внутри кластера.
      targetPort: 3100
      # Порт на поде (совпадает с containerPort в loki-deployment.yaml).
      name: http
      # Имя порта.
      
# КАК ЭТО РАБОТАЕТ:
# -----------------
# 1. Promtail (сборщик логов) отправляет логи на адрес loki:3100.
# 2. Запрос попадает в сервис loki.
# 3. Сервис по селектору app: loki находит под с Loki.
# 4. Запрос перенаправляется в под на порт 3100.
# 5. Loki обрабатывает логи и сохраняет их.
# 6. Grafana при запросе логов обращается к тому же адресу loki:3100.
# 7. Сервис обеспечивает стабильную точку доступа — даже если под пересоздастся, адрес остаётся тем же.