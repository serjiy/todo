apiVersion: v1
kind: Service
# Service — постоянная точка доступа к подам MongoDB.

metadata:
  name: mongo
  # Имя сервиса. Flask обращается к базе по этому имени.
  labels:
    app: mongo
  # Метка для идентификации сервиса.

spec:
  ports:
  - port: 27017
    # Порт, на котором сервис доступен внутри кластера.
    targetPort: 27017
    # Порт на поде MongoDB (совпадает с containerPort).
    name: mongo
    # Имя порта.

  selector:
    app: mongo
  # Сервис направляет трафик на поды с меткой app: mongo.
  
# КАК ЭТО РАБОТАЕТ:
# -----------------
# 1. Flask подключается к MongoDB по адресу mongo:27017 (из переменных окружения).
# 2. Запрос попадает в сервис mongo.
# 3. Сервис по селектору app: mongo находит под с MongoDB.
# 4. Запрос перенаправляется в под на порт 27017.
# 5. MongoDB обрабатывает запрос, ответ возвращается через сервис.
# 6. Тип сервиса не указан — по умолчанию ClusterIP, доступ только внутри кластера.