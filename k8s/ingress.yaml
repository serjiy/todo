apiVersion: networking.k8s.io/v1
kind: Ingress
# Ingress — правила маршрутизации внешних запросов к сервисам внутри кластера.

metadata:
  name: todo-ingress
  # Имя Ingress. Используется для просмотра статуса через kubectl.

spec:
  rules:
  - host: todo.local
    # Правило для домена todo.local. Все запросы с таким Host заголовком обрабатываются этим правилом.
    http:
      paths:
      - path: /
        # Путь, на который применяется правило. "/" соответствует всем путям.
        pathType: Prefix
        # Тип сопоставления — Prefix, означает "начинается с". Подходит для /list, /metrics и т.д.
        backend:
          service:
            name: todo
            # Имя сервиса, который получает трафик. Должно совпадать с именем в todo-service.yaml.
            port:
              number: 5000
            # Порт сервиса.
            
# КАК ЭТО РАБОТАЕТ:
# -----------------
# 1. Ingress-контроллер (в Minikube это nginx) слушает внешние HTTP-запросы.
# 2. При запросе с заголовком Host: todo.local контроллер применяет это правило.
# 3. Запрос направляется в сервис todo на порт 5000.
# 4. Сервис todo распределяет запрос между подами приложения.
# 5. Ответ от пода возвращается через сервис и Ingress обратно клиенту.
# 6. Для работы требуется запись в /etc/hosts, связывающая todo.local с IP кластера.