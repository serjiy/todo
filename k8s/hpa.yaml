# k8s/hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
# HorizontalPodAutoscaler — автоматически изменяет количество подов в зависимости от нагрузки.

metadata:
  name: todo-app-hpa
  # Имя HPA. Используется для просмотра состояния через kubectl.
  labels:
    app: todo
  # Метка для идентификации приложения.

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: todo-app
  # Указывает, какой ресурс масштабируется — деплоймент todo-app.

  minReplicas: 2
  # Минимальное количество подов — 2. Меньше этого значения HPA не опустится.
  maxReplicas: 5
  # Максимальное количество подов — 5. Ограничение для защиты ресурсов кластера.

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  # Метрика для масштабирования — загрузка CPU.
  # Целевое значение — 50% от запрошенных ресурсов (requests.cpu).
  
# КАК ЭТО РАБОТАЕТ:
# -----------------
# 1. HPA регулярно запрашивает метрики CPU у metrics-server.
# 2. Вычисляется средняя загрузка CPU по всем подам деплоймента todo-app.
# 3. Если средняя загрузка превышает 50%, HPA рассчитывает необходимое количество подов по формуле:
#    желаемое_количество = текущее_количество * (текущая_нагрузка / целевая_нагрузка)
# 4. HPA увеличивает количество подов до рассчитанного значения (не более 5).
# 5. При снижении нагрузки ниже 50% HPA постепенно уменьшает количество подов до минимального (2).
# 6. Изменение количества подов происходит через обновление поля replicas в деплойменте.
# 7. Решения о масштабировании принимаются с задержкой, чтобы избежать частых колебаний.