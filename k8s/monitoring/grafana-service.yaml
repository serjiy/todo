apiVersion: v1
kind: Service

metadata:
  name: grafana
  # Имя сервиса. Внутри кластера доступен как "grafana".
  labels:
    app: grafana
  # Метка для идентификации сервиса.

spec:
  selector:
    app: grafana
  # Сервис направляет трафик на поды с меткой app: grafana.

  ports:
  - port: 3000
    # Порт, на котором сервис доступен внутри кластера.
    targetPort: 3000
    # Порт на поде (совпадает с containerPort в grafana-deployment.yaml).
    name: web
    # Имя порта.

  type: NodePort
  # Тип NodePort открывает доступ снаружи кластера через порт в диапазоне 30000-32767.
  
# КАК ЭТО РАБОТАЕТ:
# -----------------
# 1. Пользователь выполняет minikube service grafana или обращается к NodePort напрямую.
# 2. Запрос приходит в сервис grafana на порт 3000.
# 3. Сервис по селектору app: grafana находит под с Grafana.
# 4. Запрос перенаправляется в под на порт 3000.
# 5. Grafana возвращает веб-интерфейс.
# 6. Внутри кластера другие сервисы могут обращаться к Grafana по имени "grafana:3000".