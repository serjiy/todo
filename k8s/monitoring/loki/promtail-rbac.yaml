apiVersion: v1
kind: ServiceAccount
# Создаёт учётную запись для подов Promtail.

metadata:
  name: promtail
  # Имя сервисного аккаунта.
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
# ClusterRole — набор разрешений на уровне всего кластера.

metadata:
  name: promtail
  # Имя роли.

rules:
  - apiGroups: [""]
    # Пустая группа — core API.
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    # Promtail имеет право читать информацию о нодах, сервисах, подах.
    verbs: ["get", "watch", "list"]
    # Разрешённые действия: получать, следить, просматривать список.

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
# ClusterRoleBinding привязывает роль к сервисному аккаунту.

metadata:
  name: promtail

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
  # Привязывается роль promtail.

subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: default
  # Привязывается к сервисному аккаунту promtail в namespace default.
  
# КАК ЭТО РАБОТАЕТ:
# -----------------
# 1. Создаётся сервисный аккаунт promtail.
# 2. Создаётся роль с правами на чтение подов, сервисов, нод.
# 3. Роль привязывается к сервисному аккаунту через ClusterRoleBinding.
# 4. В promtail-daemonset.yaml указан этот сервисный аккаунт.
# 5. При запуске под Promtail получает токен этого аккаунта.
# 6. Promtail использует эти права, чтобы получать метаданные о подах (имена, метки, namespace).
# 7. Эти метаданные добавляются к логам при отправке в Loki.
# 8. Без этих прав логи были бы просто текстом без привязки к конкретным подам.